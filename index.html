<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContactHub - Smart Contact Manager</title>
  <link rel="icon" href="images/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">


 <!-- Open Graph -->
  <meta property="og:title"       content="ContactHub - Smart Contact Manager" />
  <meta property="og:description" content="Manage and organize your contacts easily" />
  <meta property="og:image"       content="https://contact-hub.com/images\ContactHub - Smart Contact Manager.png" />
  <meta property="og:url"         content="https://contact-hub.com" />
  <meta property="og:type"        content="website" />

  <!-- Twitter/X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="ContactHub - Smart Contact Manager" />
  <meta name="twitter:description" content="Manage and organize your contacts easily" />
  <meta name="twitter:image"       content="https://contact-hub.com/images\ContactHub - Smart Contact Manager.png" />

  <link rel="stylesheet" href="./css/all.min.css" />
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <nav class="navbar fixed-top">
    <div class="container">
      <div class="d-flex flex-wrap gap-2 align-items-center">
        <div class="logo d-flex justify-content-center align-items-center" href="#">
          <i class="fas fs-5 text-white fa-contact-book"></i>
        </div>
        <div>
          <h1 class="mb-0 fs-4 fw-bold">Contact<span class="text-purple">Hub</span></h1>
          <p class="fs-xxs d-none d-md-block text-color mb-0">Smart Contact Manager</p>
        </div>
      </div>
      <div class="d-flex flex-wrap align-items-center gap-2">
        <button data-bs-toggle="modal" data-bs-target="#contactModal"> <i class="fas fa-plus"></i> Add <span
            class="d-none d-md-inline">Contact</span></button>
        <span class="nav-icon"><i class="fas d-none text-color d-md-block fa-bell"></i></span>
        <span class="nav-icon"><i class="fas d-none text-color d-md-block fa-gear"></i></span>
        <div class="image"><img src="images/avatar-4.jpg" alt="profile image"></div>
      </div>
    </div>
  </nav>

  <!-- Modal -->
  <div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 520px;">
      <div class="modal-content">

        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title" id="contactModalLabel">Add New Contact</h5>
          <button type="button" class="close-btn shadow-none border-0 ms-auto" data-bs-dismiss="modal"
            aria-label="Close"> <i class="fas fa-close"></i> </button>
        </div>

        <!-- Body -->
        <div class="modal-body">

          <!-- Avatar -->
          <div class="avatar-wrap">
            <div class="avatar-circle" onclick="document.getElementById('photoInput').click()">
              <i class="fas fs-4 fa-user" id="avatarIcon"></i>
              <img id="avatarImg" src="" alt="avatar Image" class="d-none" />
              <div class="avatar-overlay">
                <i class="fas fa-camera  text-white fs-5"></i>
              </div>
            </div>
            <button class="btn-change-photo" onclick="document.getElementById('photoInput').click()">
              <i class="fas fa-camera"></i> Change Photo
            </button>
            <input type="file" id="photoInput" accept="image/*" class="d-none" />
          </div>

          <!-- Fields -->
          <div class="mb-3">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input oninput="isValidInput(validationRegex.fullName, fullNameInput)"  type="text" id="fullName" class="form-control" placeholder="Enter full name" />
            <p class="text-danger fs-xxs mt-2" id="fullNameError"></p>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number <span class="text-danger">*</span></label>
            <input oninput="isValidInput(validationRegex.phoneNumber, phoneNumberInput)" type="tel" id="phoneNumber" class="form-control" placeholder="e.g., 01012345678" />
            <p class="text-danger fs-xxs mt-2" id="phoneNumberError"></p>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" />
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" id="address" class="form-control" placeholder="Enter address" />
          </div>

          <div class="mb-3">
            <label class="form-label">Group</label>
            <select id="groub" class="form-select" onchange="this.classList.add('selected')">
              <option disabled selected>Select a group</option>
              <option value="family">Family</option>
              <option value="friends">Friends</option>
              <option value="school">School</option>
              <option value="work">Work</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea id="notes" class="form-control" placeholder="Add notes about this contact"></textarea>
          </div>

          <!-- Checkboxes -->
          <div class="checks-row">
            <label class="check-item">
              <input type="checkbox" id="favCheck" />
              <span> <i class="fas text-warning fa-star"></i> Favorite</span>
            </label>
            <label class="check-item">
              <input type="checkbox" id="emergencyCheck" />
              <span> <i class="fas fa-heart-pulse text-danger"></i> Emergency</span>
            </label>
          </div>
          
          <!-- Footer -->
          <div class="modal-footer  mt-4">
            <button class="btn-save w-100 btn-footer" onclick="saveContact()">
              <i class="fas fa-check"></i> Save Contact
            </button>
            <button class="btn-cancel order-sm-first  w-100 btn-footer" data-bs-dismiss="modal">Cancel</button>
          </div>
        </div>

      </div>
    </div>
  </div>


  <section class="bg-body-tertiary py-5">
    <div class="container pt-5">
      <div class="row g-3">
        <div class=" col-6 col-md-4 ">
          <div class="box p-3 d-flex flex-wrap gap-3 align-items-center">
            <div class="icon total-icon">
              <i class="fas fa-users"></i>
            </div>
            <div>
              <p class="mb-0 text-color fs-xxs fw-semibold text-uppercase">Total</p>
              <p class="mb-0 fs-5 fw-bold" id="total-contacts"> </p>
            </div>
          </div>
        </div>
        <div class=" col-6 col-md-4 ">
          <div class="box p-3 d-flex flex-wrap gap-3 align-items-center">
            <div class="icon favorites-icon">
              <i class="fas fa-star"></i>
            </div>
            <div>
              <p class="mb-0 text-color fs-xxs fw-semibold text-uppercase">Favorites</p>
              <p class="mb-0 fs-5 fw-bold" id="favorites"></p>
            </div>
          </div>
        </div>
        <div class=" col-6 col-md-4 ">
          <div class="box p-3 d-flex flex-wrap gap-3 align-items-center">
            <div class="icon emergency-icon">
              <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <div>
              <p class="mb-0 text-color fs-xxs fw-semibold text-uppercase">Emergency</p>
              <p class="mb-0 fs-5 fw-bold" id="emergency"></p>
            </div>
          </div>
        </div>
      </div>
      <div class="py-4 row">
        <div class="main-content col-xl-9">
          <div class="title">
            <h2 class="mb-0 fw-bold">All Contacts</h2>
            <p class="text-color fw-medium fs-xs">Manage and organize your <span id="total"></span> contacts</p>
          </div>
          <div class="position-relative">
            <div class="icon-wrapper position-absolute z-1 top-50 ms-3 translate-middle-y">
              <i class="fas fa-search"></i>
            </div>
            <input oninput="search()" type="search" class="form-control search-inupt rounded-4" id="search"
              placeholder="Search by name, phone, or email...">
          </div>
          <div id="rowdata" class="row mt-3 g-3">
            <!-- contact cards هنا ترقد ال -->
          </div>
        </div>
        <div class="side-content mt-3 col-xl-3">
          <div id="favorites" class="favorites-contacts-card rounded-4">
            <div class="favorites-contacts-card-head p-3">
              <div class="d-flex flex-wrap align-items-center gap-2">
                <div
                  class="favorites-contacts-icon rounded-3 d-flex flex-wrap justify-content-center align-items-center">
                  <i class="fas fa-star text-white "></i>
                </div>
                <div>
                  <h2 class="mb-0 fs-xs fw-semibold">Favorites</h2>
                  <p class="fs-xxs mb-0 fw-medium text-color">Quick access</p>
                </div>
              </div>
            </div>
            <div class="favorites-contacts-card-body p-3">
              <div id="favoritesRowData" class="contact-summary row g-3">

              </div>
            </div>
          </div>
          <div id="emergency" class="emergency-contacts-card mt-3 rounded-4">
            <div class="emergency-contacts-card-head p-3">
              <div class="d-flex flex-wrap align-items-center gap-2">
                <div
                  class="emergency-contacts-icon rounded-3 d-flex flex-wrap justify-content-center align-items-center">
                  <i class="fas fa-heart-pulse text-white "></i>
                </div>
                <div>
                  <h2 class="mb-0 fs-xs fw-semibold">Emergency</h2>
                  <p class="fs-xxs mb-0 text-color">Urgent contacts</p>
                </div>
              </div>
            </div>
            <div id="emergencyRowData" class="emergency-contacts-card-body row g-2 p-3">

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
